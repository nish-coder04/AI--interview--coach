<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Interview</title>
    <style>
        body {
            font-family: Arial;
            margin: 0;
        }

        h2 {
            color: #185FA5;
        }

        .interview-container {
            display: flex;
            height: 100vh;
        }

        .question-panel {
            width: 50%;
            padding: 30px;
            background: #1e1e1e;
            color: white;
            border-right: 1px solid #333;
        }

        .answer-panel {
            width: 50%;
            padding: 30px;
            background: #1e1e1e;
            color: white;
        }

        select {
            padding: 6px;
            margin-bottom: 15px;
        }

        textarea {
            width: 100%;
            background: #2d2d2d;
            color: #d4d4d4;
            font-family: monospace;
            padding: 10px;
        }
    </style>
</head>

<body>
    <div class="interview-container">
        <div class="question-panel">
            <h2>{{ round_type.capitalize() }} Round — Question {{ current_number }} of {{ total }}</h2>
            <p id="timer">Time Remaining: 02:00</p>
            <p>{{ question }}</p>
        </div>
        <div class="answer-panel">
            <label>Language: </label>
            <select>
                <option value="c">C</option>
                <option value="javascript">JavaScript</option>
                <option value="python">Python</option>
                <option value="java">Java</option>
                <option value="cpp">C++</option>
            </select>
            <br>
            <form action="/next" method="POST">
                <textarea name="answer" rows="15"></textarea>
                {% if round_type != "technical" %}
                <br>
                <button type="button" id="micButton">🎤 Start Recording</button>
                {% endif %}
                <br><br>
                <button type="submit">Submit</button>
            </form>
            <a href="/previous"><button>Previous</button></a>
            <button>Run</button>
        </div>
    </div>
    <script>
        let timeLeft = {{ time_remaining }};

        function updateTimer() {
            let minutes = Math.floor(timeLeft / 60);
            let seconds = timeLeft % 60;
            document.getElementById("timer").innerText = "Time Remaining: " + minutes + ":" + (seconds < 10 ? "0" + seconds : seconds);

            if (timeLeft <= 0) {
                document.getElementById("timer").innerText = "Time's Up!";
                window.location.href = "/timeup";
            } else {
                timeLeft = timeLeft - 1;
            }
        }

        setInterval(updateTimer, 1000);
        if (document.getElementById("micButton")) {
            const recognition = new webkitSpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = false;

            let isRecording = false;

            document.getElementById("micButton").addEventListener("click", function () {
                if (!isRecording) {
                    recognition.start();
                    isRecording = true;
                    this.innerText = "🔴 Stop Recording";
                } else {
                    recognition.stop();
                    isRecording = false;
                    this.innerText = "🎤 Start Recording";
                }
            });

            recognition.onresult = function (event) {
                let spokenText = event.results[event.results.length - 1][0].transcript;
                let textarea = document.querySelector("textarea[name='answer']");
                textarea.value = textarea.value + " " + spokenText;
            };
        }
    </script>
</body>


</html>
