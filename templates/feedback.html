<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Interview Feedback</title>
    <style>
        body {
            font-family: Arial;
            background: #f0f4f8;
            padding: 40px;
            max-width: 800px;
            margin: 0 auto;
        }

        h1 {
            color: #185FA5;
        }

        .feedback-box {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            line-height: 1.6;
        }

        .feedback-box h3,
        .feedback-box h4 {
            color: #185FA5;
        }
    </style>
</head>

<body>
    <h1>{{ status }}</h1>
    <div class="feedback-box">
        {{ feedback | safe }}
    </div>
</body>

</html>
